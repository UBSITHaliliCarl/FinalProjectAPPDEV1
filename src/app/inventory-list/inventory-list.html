<div class="dashboard-wrapper">
    <h2>Live Stock Dashboard</h2>
  
    <form (ngSubmit)="submitItem()" class="stock-form">
      <input [(ngModel)]="newItem.name" name="name" placeholder="Item Name" required />
      <input [(ngModel)]="newItem.sku" name="sku" placeholder="SKU String" required />
      <input [(ngModel)]="newItem.quantity" name="quantity" type="number" placeholder="Quantity" />
      <input [(ngModel)]="newItem.price" name="price" type="number" placeholder="Unit Price" />
      <input [(ngModel)]="newItem.category" name="category" placeholder="Category" />
      <button type="submit" class="btn-primary">Add New Stock</button>
    </form>
  
    <table class="inventory-table">
      <thead>
        <tr>
          <th>Asset Designation</th>
          <th>SKU Identification</th>
          <th>Stock Units</th>
          <th>Unit Valuation</th>
          <th>Category</th>
          <th>Operational Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.name }}</td>
          <td><code>{{ item.sku }}</code></td>
          <td>
            <span [class.low-stock]="item.quantity < 5" class="stock-badge">
              {{ item.quantity }}
            </span>
          </td>
          <td>{{ item.price | currency }}</td>
          <td>{{ item.category }}</td>
          <td>
            <button (click)="deleteItem(item._id)" class="btn-danger">Purge</button>
          </td>
        </tr>
        <tr *ngIf="items.length === 0">
          <td colspan="6" style="text-align: center; color: #777;">No assets tracked. Add stock above.</td>
        </tr>
      </tbody>
    </table>
  </div>nps
