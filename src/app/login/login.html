<div class="dashboard-container">
  <header>
    <h1>🔐 Carl² Enterprises</h1>
    <p>Portal Login System</p>
  </header>

  <section class="form-section" style="max-width: 400px; margin: 0 auto;">
    <h3>👤 User Authentication</h3>
    <form (ngSubmit)="onLogin()">
      <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem;">
        <input type="text" [(ngModel)]="username" name="username" placeholder="✉️ Username or Email" required />
        <input type="password" [(ngModel)]="password" name="password" placeholder="🔑 Password" required />
      </div>
      <div class="form-actions">
        <button type="submit" [disabled]="!username || !password">🚀 Sign In</button>
      </div>
    </form>
  </section>
</div>
